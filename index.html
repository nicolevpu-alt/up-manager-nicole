  </div>

<script>

let clientes =
  JSON.parse(localStorage.getItem('clientes')) || [];

const valoresPlanos = {
  '100MB': 99.90,
  '200MB': 109.90,
  '300MB': 129.90,
  '400MB': 109.90,
  '500MB': 109.90,
  '600MB': 129.90,
  '800MB': 149.90,
  '1GB': 199.90
};

const sugestoesUP = {
  '100MB': '500MB',
  '200MB': '600MB',
  '300MB': '800MB',
  '400MB': '600MB',
  '500MB': '600MB',
  '600MB': '800MB',
  '800MB': '1GB'
};

function salvarClientes() {

  localStorage.setItem(
    'clientes',
    JSON.stringify(clientes)
  );
}

function copiarNumero(numero) {

  navigator.clipboard.writeText(numero);

  alert('Número copiado 😭🧡');
}

function alterarStatus(index, status) {

  clientes[index].status = status;

  salvarClientes();

  renderizarClientes();
}

function excluirCliente(index) {

  clientes.splice(index, 1);

  salvarClientes();

  renderizarClientes();
}

function alterarPlano(index, novoPlano) {

  clientes[index].planoOfertado = novoPlano;

  const valorAtual =
    valoresPlanos[clientes[index].planoAtual];

  const valorNovo =
    valoresPlanos[novoPlano];

  clientes[index].comissao =
    valorNovo - valorAtual;

  salvarClientes();

  renderizarClientes();
}

function criarCard(cliente, index) {

  return `

    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">

      <div class="mb-4">

        <h3 class="text-lg font-bold">
          ${cliente.nome}
        </h3>

        <p class="text-zinc-400 text-sm mt-1">
          📞 ${cliente.telefone || '-'}
        </p>

      </div>

      <div class="space-y-3 mb-4">

        <p class="text-sm">
          📶 ${cliente.planoAtual}
        </p>

        <select
          onchange="alterarPlano(${index}, this.value)"
          class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2 text-sm">

          <option value="500MB" ${cliente.planoOfertado === '500MB' ? 'selected' : ''}>
            500MB
          </option>

          <option value="600MB" ${cliente.planoOfertado === '600MB' ? 'selected' : ''}>
            600MB
          </option>

          <option value="800MB" ${cliente.planoOfertado === '800MB' ? 'selected' : ''}>
            800MB
          </option>

          <option value="1GB" ${cliente.planoOfertado === '1GB' ? 'selected' : ''}>
            1GB
          </option>

        </select>

        <p class="text-sm">
          💰 Comissão:
          <strong>R$ ${cliente.comissao}</strong>
        </p>

      </div>

      <div class="flex flex-wrap gap-2">

        <button
          onclick="copiarNumero('${cliente.telefone}')"
          class="bg-green-500/20 hover:bg-green-500/30 text-green-400 px-3 py-2 rounded-xl text-xs">

          Copiar
        </button>

        <button
          onclick="alterarStatus(${index}, 'Novo')"
          class="bg-blue-500/20 hover:bg-blue-500/30 text-blue-400 px-3 py-2 rounded-xl text-xs">

          Novo
        </button>

        <button
          onclick="alterarStatus(${index}, 'Pensando')"
          class="bg-yellow-500/20 hover:bg-yellow-500/30 text-yellow-400 px-3 py-2 rounded-xl text-xs">

          Pensando
        </button>

        <button
          onclick="alterarStatus(${index}, 'Não respondeu')"
          class="bg-red-500/20 hover:bg-red-500/30 text-red-400 px-3 py-2 rounded-xl text-xs">

          Não respondeu
        </button>

        <button
          onclick="alterarStatus(${index}, 'Não atendeu')"
          class="bg-zinc-700 hover:bg-zinc-600 text-zinc-300 px-3 py-2 rounded-xl text-xs">

          Não atendeu
        </button>

        <button
          onclick="alterarStatus(${index}, 'Fechado')"
          class="bg-green-500/20 hover:bg-green-500/30 text-green-400 px-3 py-2 rounded-xl text-xs">

          Fechado
        </button>

        <button
          onclick="excluirCliente(${index})"
          class="bg-red-900/20 hover:bg-red-900/30 text-red-300 px-3 py-2 rounded-xl text-xs">

          Excluir
        </button>

      </div>

    </div>
  `;
}

function renderizarClientes() {

  const busca =
    document
      .getElementById('search')
      .value
      .toLowerCase();

  const containers = {

    'Novo':
      document.getElementById('novoContainer'),

    'Pensando':
      document.getElementById('pensandoContainer'),

    'Não respondeu':
      document.getElementById('naoRespondeuContainer'),

    'Não atendeu':
      document.getElementById('naoAtendeuContainer'),

    'Fechado':
      document.getElementById('fechadoContainer')
  };

  Object.values(containers)
    .forEach(container => {

      container.innerHTML = '';
    });

  let countNovo = 0;
  let countPensando = 0;
  let countNaoRespondeu = 0;
  let countNaoAtendeu = 0;
  let countFechado = 0;

clientes.slice(0, 150).forEach((cliente, index) => {

    if(
      !cliente.nome
        .toLowerCase()
        .includes(busca)
    ) return;

    const card =
      criarCard(cliente, index);

    switch(cliente.status) {

      case 'Pensando':

        containers['Pensando']
          .innerHTML += card;

        countPensando++;

      break;

      case 'Não respondeu':

        containers['Não respondeu']
          .innerHTML += card;

        countNaoRespondeu++;

      break;

      case 'Não atendeu':

        containers['Não atendeu']
          .innerHTML += card;

        countNaoAtendeu++;

      break;

      case 'Fechado':

        containers['Fechado']
          .innerHTML += card;

        countFechado++;

      break;

      default:

        containers['Novo']
          .innerHTML += card;

        countNovo++;
    }
  });

  document.getElementById('countNovo')
    .innerText = countNovo;

  document.getElementById('countPensando')
    .innerText = countPensando;

  document.getElementById('countNaoRespondeu')
    .innerText = countNaoRespondeu;

  document.getElementById('countNaoAtendeu')
    .innerText = countNaoAtendeu;

  document.getElementById('countFechado')
    .innerText = countFechado;

  document.getElementById('totalClientes')
    .innerText = clientes.length;

  document.getElementById('upsFechados')
    .innerText = countFechado;

  document.getElementById('pendentes')
    .innerText =
      clientes.filter(cliente =>
        cliente.status !== 'Fechado'
      ).length;

  const comissaoTotal =
    clientes

      .filter(cliente =>
        cliente.status === 'Fechado'
      )

      .reduce(
        (total, cliente) =>
          total + Number(cliente.comissao || 0),
        0
      );

  document.getElementById('comissaoTotal')
    .innerText =
      `R$ ${comissaoTotal}`;
}

function exportarClientes() {

  const blob = new Blob(
    [JSON.stringify(clientes, null, 2)],
    {
      type: 'application/json'
    }
  );

  const url =
    URL.createObjectURL(blob);

  const a =
    document.createElement('a');

  a.href = url;

  a.download = 'clientes.json';

  a.click();
}

function importarPlanilha(event) {

  const file =
    event.target.files[0];

  if(!file) return;

  const reader =
    new FileReader();

  reader.onload = function(e) {

    const data =
      new Uint8Array(e.target.result);

    const workbook =
      XLSX.read(data, {
        type: 'array'
      });

    const worksheet =
      workbook.Sheets[
        workbook.SheetNames[0]
      ];

    const rows =
      XLSX.utils.sheet_to_json(
        worksheet,
        { header: 1 }
      );

    const novosClientes = [];

    for(let i = 1; i < rows.length; i++) {

      const row = rows[i];

      if(!row || row.length === 0)
        continue;

      const nome =
        row[0] || `Cliente ${i}`;

      const telefone =
        row[1] || '';

      const planoAtual =
        '400MB';

      const planoOfertado =
        sugestoesUP[planoAtual];

      const valorAtual =
        valoresPlanos[planoAtual];

      const valorNovo =
        valoresPlanos[planoOfertado];

      const comissao =
        valorNovo - valorAtual;

      novosClientes.push({

        nome: String(nome),

        telefone: String(telefone),

        planoAtual,

        planoOfertado,

        comissao,

        status: 'Novo'
      });
    }

    clientes = novosClientes;

    salvarClientes();

    renderizarClientes();

    alert(
      `${novosClientes.length} clientes importados 😭🧡`
    );
  };

  reader.readAsArrayBuffer(file);
}

function abrirModal() {

  const nome =
    prompt('Nome do cliente');

  if(!nome) return;

  const telefone =
    prompt('Telefone do cliente');

  clientes.unshift({

    nome,

    telefone,

    planoAtual: '400MB',

    planoOfertado: '600MB',

    comissao: 20,

    status: 'Novo'
  });

  salvarClientes();

  renderizarClientes();
}

renderizarClientes();

</script>
