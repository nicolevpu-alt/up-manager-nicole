<!DOCTYPE html>

<body class="bg-zinc-950 text-white min-h-screen">

    </div>

      <select id="filterStatus" onchange="renderClientes()" class="bg-zinc-900 border border-zinc-800 rounded-2xl px-4 py-3 outline-none focus:border-orange-500">

        <option value="Fechado">Fechado</option>
        <option value="Não respondeu">Não respondeu</option>
        <option value="Não atendeu">Não atendeu</option>

      </select>
    </div>

          <option>1GB</option>
        </select>

        <input id="comissao" type="number" placeholder="Comissão" class="bg-zinc-800 rounded-2xl px-4 py-3 outline-none" />

        <input id="followup" type="date" class="bg-zinc-800 rounded-2xl px-4 py-3 outline-none" />

  <script>

    let clientes = JSON.parse(localStorage.getItem('clientes')) || [];
    let clientesPorPagina = 50;
    let paginaAtual = 1;

    function saveClientes() {
      localStorage.setItem('clientes', JSON.stringify(clientes));
    }

    function openModal() {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal').classList.remove('flex');
    }

    function addCliente() {
      const cliente = {
        nome: document.getElementById('cliente').value,
        telefone: document.getElementById('telefone').value,
        planoAtual: document.getElementById('planoAtual').value,
        planoOfertado: document.getElementById('planoOfertado').value,
        comissao: Number(document.getElementById('comissao').value),
        followup: document.getElementById('followup').value,
        status: document.getElementById('status').value
      };

      clientes.push(cliente);
      saveClientes();
      renderClientes();
      closeModal();

      document.querySelectorAll('input').forEach(input => input.value = '');
    }

          table.innerHTML += `

                  : ''}
              </div>

              <div class="flex flex-wrap gap-2">
                <a href="https://wa.me/55${cliente.telefone}" target="_blank" class="bg-green-500/20 hover:bg-green-500/30 text-green-400 px-3 py-2 rounded-xl text-sm transition">
                  WhatsApp
                </a>

                <button onclick="editCliente(${index})" class="bg-blue-500/20 hover:bg-blue-500/30 text-blue-400 px-3 py-2 rounded-xl text-sm transition">

      const totalPaginas = Math.ceil(clientesFiltrados.length / clientesPorPagina) || 1;

      document.getElementById('totalClientes').innerText = clientes.length;
      document.getElementById('upsFechados').innerText = upsFechados;

      document.getElementById('pendentes').innerText = pendentes;

      const totalPaginas = Math.ceil(clientesFiltrados.length / clientesPorPagina) || 1;
      document.getElementById('paginaInfo').innerText = `Página ${paginaAtual} de ${totalPaginas}`;
    }

    function exportData() {
      const dataStr = JSON.stringify(clientes, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'clientes-up-manager.json';
      a.click();
    }

          try {
            const imported = JSON.parse(e.target.result);

        });

      document.getElementById('totalClientes').innerText = clientes.length;
      document.getElementById('upsFechados').innerText = upsFechados;
      document.getElementById('comissaoTotal').innerText = `R$ ${totalComissao}`;
      document.getElementById('pendentes').innerText = pendentes;
    }

    function editCliente(index) {
      const cliente = clientes[index];

      document.getElementById('cliente').value = cliente.nome;
      document.getElementById('telefone').value = cliente.telefone;
      document.getElementById('planoAtual').value = cliente.planoAtual;
      document.getElementById('planoOfertado').value = cliente.planoOfertado;
      document.getElementById('comissao').value = cliente.comissao;
