<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>UP Manager Nicole</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body class="bg-zinc-950 text-white min-h-screen">

  <div class="max-w-[1900px] mx-auto p-6">

    <!-- HEADER -->

    <div class="flex flex-col lg:flex-row justify-between gap-4 mb-8">

      <div>

        <h1 class="text-5xl font-bold">
          🧡 UP Manager
        </h1>

        <p class="text-zinc-400 mt-2">
          CRM pessoal de UPs da Nicole
        </p>

      </div>

      <div class="flex flex-wrap gap-3">

        <button
          onclick="exportarClientes()"
          class="bg-zinc-900 border border-zinc-800 hover:border-orange-500 transition px-5 py-3 rounded-2xl">

          📤 Exportar
        </button>

        <label
          class="bg-zinc-900 border border-zinc-800 hover:border-orange-500 transition px-5 py-3 rounded-2xl cursor-pointer">

          📥 Importar Excel

          <input
            type="file"
            accept=".xlsx,.xls"
            onchange="importarPlanilha(event)"
            class="hidden"
          />

        </label>

      </div>

    </div>

    <!-- DASHBOARD -->

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">

      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5">

        <p class="text-zinc-400 text-sm">
          Clientes
        </p>

        <h2
          id="totalClientes"
          class="text-4xl font-bold mt-2">

          0
        </h2>

      </div>

      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5">

        <p class="text-zinc-400 text-sm">
          Fechados
        </p>

        <h2
          id="upsFechados"
          class="text-4xl font-bold mt-2">

          0
        </h2>

      </div>

      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5">

        <p class="text-zinc-400 text-sm">
          Comissão
        </p>

        <h2
          id="comissaoTotal"
          class="text-4xl font-bold mt-2">

          R$ 0
        </h2>

      </div>

      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5">

        <p class="text-zinc-400 text-sm">
          Pendentes
        </p>

        <h2
          id="pendentes"
          class="text-4xl font-bold mt-2">

          0
        </h2>

      </div>

    </div>

    <!-- BUSCA -->

    <div class="mb-8">

      <input
        type="text"
        id="search"
        placeholder="Buscar cliente..."
        onkeyup="renderizarClientes()"
        class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl px-4 py-3 outline-none focus:border-orange-500"
      />

    </div>

    <!-- KANBAN -->

    <div
      class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-4">

      <div class="kanban-coluna">
        <div class="titulo-kanban text-blue-400">
          🔵 Novos
          <span id="countNovo">0</span>
        </div>

        <div id="novoContainer"></div>

        <button
          onclick="carregarMais('Novo')"
          class="botao-carregar">

          Carregar mais
        </button>
      </div>

      <div class="kanban-coluna">
        <div class="titulo-kanban text-yellow-400">
          🟡 Pensando
          <span id="countPensando">0</span>
        </div>

        <div id="pensandoContainer"></div>

        <button
          onclick="carregarMais('Pensando')"
          class="botao-carregar">

          Carregar mais
        </button>
      </div>

      <div class="kanban-coluna">
        <div class="titulo-kanban text-red-400">
          🔴 Não respondeu
          <span id="countNaoRespondeu">0</span>
        </div>

        <div id="naoRespondeuContainer"></div>

        <button
          onclick="carregarMais('Não respondeu')"
          class="botao-carregar">

          Carregar mais
        </button>
      </div>

      <div class="kanban-coluna">
        <div class="titulo-kanban text-zinc-300">
          ⚫ Não atendeu
          <span id="countNaoAtendeu">0</span>
        </div>

        <div id="naoAtendeuContainer"></div>

        <button
          onclick="carregarMais('Não atendeu')"
          class="botao-carregar">

          Carregar mais
        </button>
      </div>

      <div class="kanban-coluna">
        <div class="titulo-kanban text-green-400">
          🟢 Fechado
          <span id="countFechado">0</span>
        </div>

        <div id="fechadoContainer"></div>

        <button
          onclick="carregarMais('Fechado')"
          class="botao-carregar">

          Carregar mais
        </button>
      </div>

    </div>

  </div>

<style>

.kanban-coluna {

  background: rgba(24,24,27,.6);

  border-radius: 24px;

  padding: 16px;

  min-height: 400px;
}

.titulo-kanban {

  display: flex;

  justify-content: space-between;

  align-items: center;

  margin-bottom: 16px;

  font-size: 20px;

  font-weight: bold;
}

.titulo-kanban span {

  background: rgba(255,255,255,.1);

  padding: 4px 10px;

  border-radius: 999px;

  font-size: 12px;
}

.botao-carregar {

  width: 100%;

  margin-top: 12px;

  background: rgb(39 39 42);

  padding: 10px;

  border-radius: 14px;

  font-size: 14px;
}

.card {

  background: rgb(24 24 27);

  border: 1px solid rgb(39 39 42);

  border-radius: 20px;

  padding: 14px;

  margin-bottom: 12px;
}

.botao {

  padding: 6px 10px;

  border-radius: 12px;

  font-size: 12px;

  margin-top: 6px;
}

</style>

<script>

let clientes =
  JSON.parse(localStorage.getItem('clientes')) || [];

const LIMITE = 30;

const paginas = {

  'Novo': 1,
  'Pensando': 1,
  'Não respondeu': 1,
  'Não atendeu': 1,
  'Fechado': 1
};

const valoresPlanos = {

  '400MB': 109.90,
  '500MB': 109.90,
  '600MB': 129.90,
  '800MB': 149.90,
  '1GB': 199.90
};

function salvarClientes() {

  localStorage.setItem(
    'clientes',
    JSON.stringify(clientes)
  );
}

function carregarMais(status) {

  paginas[status]++;

  renderizarClientes();
}

function alterarStatus(index, status) {

  clientes[index].status = status;

  salvarClientes();

  renderizarClientes();
}

function alterarPlano(index, plano) {

  clientes[index].planoOfertado = plano;

  const atual =
    valoresPlanos[
      clientes[index].planoAtual
    ];

  const novo =
    valoresPlanos[plano];

  clientes[index].comissao =
    (novo - atual).toFixed(2);

  salvarClientes();

  renderizarClientes();
}

function copiarNumero(numero) {

  navigator.clipboard.writeText(numero);

  alert('Número copiado 😭🧡');
}

function criarCard(cliente, index) {

  return `

    <div class="card">

      <h3 class="font-bold text-sm">
        ${cliente.nome}
      </h3>

      <p class="text-zinc-400 text-xs mt-1">
        📞 ${cliente.telefone || '-'}
      </p>

      <div class="mt-3 space-y-2">

        <p class="text-xs">
          📶 ${cliente.planoAtual}
        </p>

        <select
          onchange="alterarPlano(${index}, this.value)"
          class="w-full bg-zinc-800 rounded-xl px-3 py-2 text-xs">

          <option value="500MB" ${cliente.planoOfertado === '500MB' ? 'selected' : ''}>
            500MB
          </option>

          <option value="600MB" ${cliente.planoOfertado === '600MB' ? 'selected' : ''}>
            600MB
          </option>

          <option value="800MB" ${cliente.planoOfertado === '800MB' ? 'selected' : ''}>
            800MB
          </option>

          <option value="1GB" ${cliente.planoOfertado === '1GB' ? 'selected' : ''}>
            1GB
          </option>

        </select>

        <p class="text-xs">
          💰 R$ ${cliente.comissao}
        </p>

      </div>

      <div class="flex flex-wrap gap-2 mt-3">

        <button
          onclick="copiarNumero('${cliente.telefone}')"
          class="botao bg-green-500/20 text-green-400">

          Copiar
        </button>

        <button
          onclick="alterarStatus(${index}, 'Pensando')"
          class="botao bg-yellow-500/20 text-yellow-400">

          Pensando
        </button>

        <button
          onclick="alterarStatus(${index}, 'Não respondeu')"
          class="botao bg-red-500/20 text-red-400">

          Não respondeu
        </button>

        <button
          onclick="alterarStatus(${index}, 'Não atendeu')"
          class="botao bg-zinc-700 text-zinc-300">

          Não atendeu
        </button>

        <button
          onclick="alterarStatus(${index}, 'Fechado')"
          class="botao bg-green-500/20 text-green-400">

          Fechado
        </button>

      </div>

    </div>
  `;
}

function renderizarClientes() {

  const busca =
    document
      .getElementById('search')
      .value
      .toLowerCase();

  const statuses = [

    'Novo',
    'Pensando',
    'Não respondeu',
    'Não atendeu',
    'Fechado'
  ];

  const containers = {

    'Novo':
      document.getElementById('novoContainer'),

    'Pensando':
      document.getElementById('pensandoContainer'),

    'Não respondeu':
      document.getElementById('naoRespondeuContainer'),

    'Não atendeu':
      document.getElementById('naoAtendeuContainer'),

    'Fechado':
      document.getElementById('fechadoContainer')
  };

  Object.values(containers)
    .forEach(c => c.innerHTML = '');

  statuses.forEach(status => {

    const filtrados = clientes.filter(cliente => {

      return (
        (cliente.status || 'Novo') === status
        &&
        cliente.nome
          .toLowerCase()
          .includes(busca)
      );
    });

    document.getElementById(

      `count${status
        .replaceAll(' ', '')
        .replace('Não', 'Nao')}`

    ).innerText = filtrados.length;

    filtrados

      .slice(
        0,
        paginas[status] * LIMITE
      )

      .forEach((cliente, index) => {

        containers[status]
          .innerHTML += criarCard(cliente, index);
      });
  });

  document.getElementById('totalClientes')
    .innerText = clientes.length;

  const fechados =
    clientes.filter(cliente =>
      cliente.status === 'Fechado'
    );

  document.getElementById('upsFechados')
    .innerText = fechados.length;

  document.getElementById('pendentes')
    .innerText =
      clientes.length - fechados.length;

  const comissao = fechados.reduce(

    (acc, cliente) =>
      acc + Number(cliente.comissao || 0),

    0
  );

  document.getElementById('comissaoTotal')
    .innerText =
      `R$ ${comissao.toFixed(2)}`;
}

function exportarClientes() {

  const blob = new Blob(
    [JSON.stringify(clientes, null, 2)],
    {
      type: 'application/json'
    }
  );

  const url =
    URL.createObjectURL(blob);

  const a =
    document.createElement('a');

  a.href = url;

  a.download = 'clientes.json';

  a.click();
}

function importarPlanilha(event) {

  const file =
    event.target.files[0];

  if(!file) return;

  const reader =
    new FileReader();

  reader.onload = function(e) {

    const data =
      new Uint8Array(e.target.result);

    const workbook =
      XLSX.read(data, {
        type: 'array'
      });

    const worksheet =
      workbook.Sheets[
        workbook.SheetNames[0]
      ];

    const rows =
      XLSX.utils.sheet_to_json(
        worksheet,
        { header: 1 }
      );

    const novosClientes = [];

    for(let i = 1; i < rows.length; i++) {

      const row = rows[i];

      if(!row || row.length === 0)
        continue;

      novosClientes.push({

        nome:
          String(row[0] || `Cliente ${i}`),

        telefone:
          String(row[1] || ''),

        planoAtual: '400MB',

        planoOfertado: '600MB',

        comissao: '20.00',

        status: 'Novo'
      });
    }

    clientes = novosClientes;

    salvarClientes();

    paginas = {

      'Novo': 1,
      'Pensando': 1,
      'Não respondeu': 1,
      'Não atendeu': 1,
      'Fechado': 1
    };

    renderizarClientes();

    alert(
      `${novosClientes.length} clientes importados 😭🧡`
    );
  };

  reader.readAsArrayBuffer(file);
}

renderizarClientes();

</script>

</body>
</html>
