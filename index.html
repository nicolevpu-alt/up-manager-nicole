<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>UP Manager Nicole</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
</head>

<body class="bg-zinc-950 text-white min-h-screen">

  <div class="max-w-7xl mx-auto p-6">

    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between gap-4 mb-8">

      <div>
        <h1 class="text-4xl font-bold">🧡 UP Manager</h1>
        <p class="text-zinc-400 mt-2">
          Painel de gestão de UPs da Nicole
        </p>
      </div>

      <div class="flex gap-3 flex-wrap">

        <button onclick="exportData()"
          class="bg-zinc-900 border border-zinc-800 hover:border-orange-500 transition px-4 py-3 rounded-2xl">
          📤 Exportar
        </button>

        <label
          class="bg-zinc-900 border border-zinc-800 hover:border-orange-500 transition px-4 py-3 rounded-2xl cursor-pointer">

          📥 Importar Excel

          <input
            type="file"
            accept=".xlsx,.xls,.json"
            onchange="importData(event)"
            class="hidden"
          />
        </label>

        <button
          onclick="openModal()"
          class="bg-orange-500 hover:bg-orange-600 transition px-5 py-3 rounded-2xl font-semibold">

          + Novo Cliente
        </button>

      </div>

    </div>

    <!-- Dashboard -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">

      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5">
        <p class="text-zinc-400 text-sm">Clientes</p>
        <h2 id="totalClientes" class="text-3xl font-bold mt-2">0</h2>
      </div>

      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5">
        <p class="text-zinc-400 text-sm">UPs Fechados</p>
        <h2 id="upsFechados" class="text-3xl font-bold mt-2">0</h2>
      </div>

      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5">
        <p class="text-zinc-400 text-sm">Comissão</p>
        <h2 id="comissaoTotal" class="text-3xl font-bold mt-2">R$0</h2>
      </div>

      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5">
        <p class="text-zinc-400 text-sm">Pendentes</p>
        <h2 id="pendentes" class="text-3xl font-bold mt-2">0</h2>
      </div>

    </div>

    <!-- Busca -->
    <div class="flex flex-col md:flex-row gap-4 mb-8">

      <input
        type="text"
        id="search"
        placeholder="Buscar cliente..."
        class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl px-4 py-3 outline-none focus:border-orange-500"
        onkeyup="renderClientes()"
      />

      <select
        id="filterStatus"
        onchange="renderClientes()"
        class="bg-zinc-900 border border-zinc-800 rounded-2xl px-4 py-3 outline-none focus:border-orange-500">

        <option value="Todos">Todos Status</option>
        <option value="Pensando">Pensando</option>
        <option value="Fechado">Fechado</option>
        <option value="Não respondeu">Não respondeu</option>
        <option value="Não atendeu">Não atendeu</option>
        <option value="Perdido">Perdido</option>

      </select>

    </div>

    <!-- Clientes -->
    <div
      id="clientesTable"
      class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
    </div>

    <!-- Paginação -->
    <div class="flex items-center justify-center gap-4 mt-8">

      <button
        onclick="paginaAnterior()"
        class="bg-zinc-900 border border-zinc-800 hover:border-orange-500 transition px-4 py-2 rounded-2xl">

        ← Anterior
      </button>

      <span id="paginaInfo" class="text-zinc-400"></span>

      <button
        onclick="proximaPagina()"
        class="bg-zinc-900 border border-zinc-800 hover:border-orange-500 transition px-4 py-2 rounded-2xl">

        Próxima →
      </button>

    </div>

  </div>

  <!-- Modal -->
  <div
    id="modal"
    class="fixed inset-0 bg-black/70 hidden items-center justify-center p-4 z-50">

    <div
      class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 w-full max-w-xl">

      <div class="flex justify-between items-center mb-6">

        <h2 class="text-2xl font-bold">Novo Cliente</h2>

        <button
          onclick="closeModal()"
          class="text-zinc-400 hover:text-white text-xl">

          ✕
        </button>

      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <input id="cliente" type="text" placeholder="Cliente"
          class="bg-zinc-800 rounded-2xl px-4 py-3 outline-none">

        <input id="telefone" type="text" placeholder="Telefone"
          class="bg-zinc-800 rounded-2xl px-4 py-3 outline-none">

        <select id="planoAtual"
          class="bg-zinc-800 rounded-2xl px-4 py-3 outline-none">

          <option>100MB</option>
          <option>400MB</option>
          <option>600MB</option>
          <option>800MB</option>
          <option>1GB</option>

        </select>

        <select id="planoOfertado"
          class="bg-zinc-800 rounded-2xl px-4 py-3 outline-none">

          <option>400MB</option>
          <option>600MB</option>
          <option>800MB</option>
          <option>1GB</option>

        </select>

        <input id="comissao" type="number" placeholder="Comissão"
          class="bg-zinc-800 rounded-2xl px-4 py-3 outline-none">

        <input id="followup" type="date"
          class="bg-zinc-800 rounded-2xl px-4 py-3 outline-none">

        <select id="status"
          class="bg-zinc-800 rounded-2xl px-4 py-3 outline-none md:col-span-2">

          <option>Pensando</option>
          <option>Não respondeu</option>
          <option>Não atendeu</option>
          <option>Fechado</option>
          <option>Perdido</option>

        </select>

      </div>

      <button
        onclick="addCliente()"
        class="w-full bg-orange-500 hover:bg-orange-600 transition py-3 rounded-2xl mt-6 font-semibold">

        Salvar Cliente
      </button>

    </div>

  </div>

  <script>

    let clientes = JSON.parse(localStorage.getItem('clientes')) || [];

    let clientesPorPagina = 50;
    let paginaAtual = 1;

    function saveClientes() {
      localStorage.setItem('clientes', JSON.stringify(clientes));
    }

    function openModal() {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal').classList.remove('flex');
    }

    function addCliente() {

      const cliente = {
        nome: document.getElementById('cliente').value,
        telefone: document.getElementById('telefone').value,
        planoAtual: document.getElementById('planoAtual').value,
        planoOfertado: document.getElementById('planoOfertado').value,
        comissao: Number(document.getElementById('comissao').value),
        followup: document.getElementById('followup').value,
        status: document.getElementById('status').value
      };

      clientes.push(cliente);

      saveClientes();
      renderClientes();
      closeModal();
    }

    function statusColor(status) {

      switch(status) {

        case 'Fechado':
          return 'bg-green-500/20 text-green-400';

        case 'Pensando':
          return 'bg-yellow-500/20 text-yellow-400';

        case 'Não respondeu':
          return 'bg-red-500/20 text-red-400';

        case 'Não atendeu':
          return 'bg-zinc-500/20 text-zinc-300';

        default:
          return 'bg-zinc-500/20 text-zinc-300';
      }
    }

    function renderClientes() {

      const table = document.getElementById('clientesTable');

      const search = document.getElementById('search').value.toLowerCase();

      table.innerHTML = '';

      let totalComissao = 0;
      let upsFechados = 0;
      let pendentes = 0;

      const clientesFiltrados = clientes

        .filter(cliente =>
          cliente.nome.toLowerCase().includes(search)
        )

        .filter(cliente => {

          const filtro = document.getElementById('filterStatus').value;

          if(filtro === 'Todos') return true;

          return cliente.status === filtro;
        });

      const inicio = (paginaAtual - 1) * clientesPorPagina;
      const fim = inicio + clientesPorPagina;

      const clientesPaginados =
        clientesFiltrados.slice(inicio, fim);

      clientesPaginados.forEach((cliente, index) => {

        totalComissao += cliente.comissao || 0;

        if(cliente.status === 'Fechado') upsFechados++;

        if(cliente.status !== 'Fechado') pendentes++;

        table.innerHTML += `

          <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5 hover:border-orange-500 transition">

            <div class="flex justify-between items-start gap-3 mb-4">

              <div>
                <h3 class="text-xl font-bold">${cliente.nome}</h3>

                <p class="text-zinc-400 text-sm mt-1">
                  📞 ${cliente.telefone || '-'}
                </p>
              </div>

              <span class="px-3 py-1 rounded-full text-sm ${statusColor(cliente.status)}">
                ${cliente.status}
              </span>

            </div>

            <div class="space-y-2 text-sm mb-5">

              <p>
                📶
                ${cliente.planoAtual} → ${cliente.planoOfertado}
              </p>

              <p>
                💰 Comissão:
                R$ ${cliente.comissao}
              </p>

              <p>
                📅 Follow-up:
                ${cliente.followup || '-'}
              </p>

            </div>

            <div class="flex flex-wrap gap-2">

              <a
                href="https://wa.me/55${cliente.telefone}"
                target="_blank"
                class="bg-green-500/20 hover:bg-green-500/30 text-green-400 px-3 py-2 rounded-xl text-sm">

                WhatsApp
              </a>

              <button
                onclick="marcarFechado(${index})"
                class="bg-orange-500/20 hover:bg-orange-500/30 text-orange-400 px-3 py-2 rounded-xl text-sm">

                Fechar
              </button>

              <button
                onclick="deleteCliente(${index})"
                class="bg-red-500/20 hover:bg-red-500/30 text-red-400 px-3 py-2 rounded-xl text-sm">

                Excluir
              </button>

            </div>

          </div>
        `;
      });

      document.getElementById('totalClientes').innerText =
        clientes.length;

      document.getElementById('upsFechados').innerText =
        upsFechados;

      document.getElementById('comissaoTotal').innerText =
        `R$ ${totalComissao}`;

      document.getElementById('pendentes').innerText =
        pendentes;

      const totalPaginas =
        Math.ceil(clientesFiltrados.length / clientesPorPagina) || 1;

      document.getElementById('paginaInfo').innerText =
        `Página ${paginaAtual} de ${totalPaginas}`;
    }

    function deleteCliente(index) {

      clientes.splice(index, 1);

      saveClientes();
      renderClientes();
    }

    function marcarFechado(index) {

      clientes[index].status = 'Fechado';

      saveClientes();
      renderClientes();
    }

    function proximaPagina() {

      const totalPaginas =
        Math.ceil(clientes.length / clientesPorPagina);

      if(paginaAtual < totalPaginas) {

        paginaAtual++;
        renderClientes();
      }
    }

    function paginaAnterior() {

      if(paginaAtual > 1) {

        paginaAtual--;
        renderClientes();
      }
    }

    function exportData() {

      const dataStr =
        JSON.stringify(clientes, null, 2);

      const blob =
        new Blob([dataStr], {
          type: 'application/json'
        });

      const url =
        URL.createObjectURL(blob);

      const a =
        document.createElement('a');

      a.href = url;

      a.download =
        'clientes-up-manager.json';

      a.click();
    }

          [...clientes, ...importedClientes];

        saveClientes();

  </script>

</body>
</html>
