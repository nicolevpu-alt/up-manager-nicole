<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>UP Manager Nicole</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body class="bg-zinc-950 text-white min-h-screen">

  <div class="max-w-7xl mx-auto p-6">

    <!-- HEADER -->
    <div class="flex flex-col md:flex-row justify-between gap-4 mb-8">

      <div>
        <h1 class="text-5xl font-bold">🧡 UP Manager</h1>

        <p class="text-zinc-400 mt-2">
          Painel pessoal de gestão de UPs da Nicole
        </p>
      </div>

      <div class="flex flex-wrap gap-3">

        <button
          onclick="exportarClientes()"
          class="bg-zinc-900 border border-zinc-800 hover:border-orange-500 transition px-5 py-3 rounded-2xl">

          📤 Exportar
        </button>

        <label
          class="bg-zinc-900 border border-zinc-800 hover:border-orange-500 transition px-5 py-3 rounded-2xl cursor-pointer">

          📥 Importar Excel

          <input
            type="file"
            accept=".xlsx,.xls"
            onchange="importarPlanilha(event)"
            class="hidden"
          />
        </label>

        <button
          onclick="abrirModal()"
          class="bg-orange-500 hover:bg-orange-600 transition px-6 py-3 rounded-2xl font-semibold">

          + Novo Cliente
        </button>

      </div>

    </div>

    <!-- DASHBOARD -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">

      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5">
        <p class="text-zinc-400 text-sm">Clientes</p>
        <h2 id="totalClientes" class="text-4xl font-bold mt-2">0</h2>
      </div>

      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5">
        <p class="text-zinc-400 text-sm">UPs Fechados</p>
        <h2 id="upsFechados" class="text-4xl font-bold mt-2">0</h2>
      </div>

      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5">
        <p class="text-zinc-400 text-sm">Comissão Total</p>
        <h2 id="comissaoTotal" class="text-4xl font-bold mt-2">R$ 0</h2>
      </div>

      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5">
        <p class="text-zinc-400 text-sm">Pendentes</p>
        <h2 id="pendentes" class="text-4xl font-bold mt-2">0</h2>
      </div>

    </div>

    <!-- FILTROS -->
    <div class="flex flex-col md:flex-row gap-4 mb-8">

      <input
        type="text"
        id="search"
        placeholder="Buscar cliente..."
        onkeyup="renderizarClientes()"
        class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl px-4 py-3 outline-none focus:border-orange-500"
      />

      <select
        id="filtroStatus"
        onchange="renderizarClientes()"
        class="bg-zinc-900 border border-zinc-800 rounded-2xl px-4 py-3 outline-none">

        <option value="Todos">Todos Status</option>
        <option value="Novo">Novo</option>
        <option value="Pensando">Pensando</option>
        <option value="Não respondeu">Não respondeu</option>
        <option value="Não atendeu">Não atendeu</option>
        <option value="Fechado">Fechado</option>

      </select>

    </div>

    <!-- CLIENTES -->
    <div
      id="clientesContainer"
      class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
    </div>

    <!-- PAGINAÇÃO -->
    <div class="flex justify-center items-center gap-4 mt-10">

      <button
        onclick="paginaAnterior()"
        class="bg-zinc-900 border border-zinc-800 hover:border-orange-500 transition px-5 py-3 rounded-2xl">

        ← Anterior
      </button>

      <span
        id="paginaInfo"
        class="text-zinc-400">
      </span>

      <button
        onclick="proximaPagina()"
        class="bg-zinc-900 border border-zinc-800 hover:border-orange-500 transition px-5 py-3 rounded-2xl">

        Próxima →
      </button>

    </div>

  </div>

  <!-- MODAL -->
  <div
    id="modal"
    class="fixed inset-0 bg-black/70 hidden items-center justify-center p-4 z-50">

    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 w-full max-w-xl">

      <div class="flex justify-between items-center mb-6">

        <h2 class="text-2xl font-bold">
          Novo Cliente
        </h2>

        <button
          onclick="fecharModal()"
          class="text-zinc-400 hover:text-white">

          ✕
        </button>

      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <input
          id="cliente"
          type="text"
          placeholder="Cliente"
          class="bg-zinc-800 rounded-2xl px-4 py-3 outline-none"
        />

        <input
          id="telefone"
          type="text"
          placeholder="Telefone"
          class="bg-zinc-800 rounded-2xl px-4 py-3 outline-none"
        />

      </div>

      <button
        onclick="adicionarCliente()"
        class="w-full bg-orange-500 hover:bg-orange-600 transition py-3 rounded-2xl mt-6 font-semibold">

        Salvar Cliente
      </button>

    </div>

  </div>

<script>

let clientes =
  JSON.parse(localStorage.getItem('clientes')) || [];

let paginaAtual = 1;

const clientesPorPagina = 50;

const valoresPlanos = {
  '100MB': 99.90,
  '200MB': 109.90,
  '300MB': 129.90,
  '400MB': 109.90,
  '500MB': 109.90,
  '600MB': 129.90,
  '800MB': 149.90,
  '1GB': 199.90
};

const sugestoesUP = {
  '100MB': '500MB',
  '200MB': '600MB',
  '300MB': '800MB',
  '400MB': '600MB',
  '500MB': '600MB',
  '600MB': '800MB',
  '800MB': '1GB'
};

function salvarClientes() {

  localStorage.setItem(
    'clientes',
    JSON.stringify(clientes)
  );
}

function abrirModal() {

  document
    .getElementById('modal')
    .classList.remove('hidden');

  document
    .getElementById('modal')
    .classList.add('flex');
}

function fecharModal() {

  document
    .getElementById('modal')
    .classList.add('hidden');

  document
    .getElementById('modal')
    .classList.remove('flex');
}

function adicionarCliente() {

  const nome =
    document.getElementById('cliente').value;

  const telefone =
    document.getElementById('telefone').value;

  clientes.unshift({

    nome,
    telefone,
    planoAtual: '400MB',
    planoOfertado: '600MB',
    comissao: 20,
    status: 'Novo',
    followup: ''

  });

  salvarClientes();

  renderizarClientes();

  fecharModal();
}

function copiarNumero(numero) {

  navigator.clipboard.writeText(numero);

  alert('Número copiado 😭🧡');
}

function alterarStatus(index, status) {

  clientes[index].status = status;

  salvarClientes();

  renderizarClientes();
}

function excluirCliente(index) {

  clientes.splice(index, 1);

  salvarClientes();

  renderizarClientes();
}

function alterarPlano(index, novoPlano) {

  clientes[index].planoOfertado = novoPlano;

  const valorAtual =
    valoresPlanos[clientes[index].planoAtual];

  const valorNovo =
    valoresPlanos[novoPlano];

  clientes[index].comissao =
    valorNovo - valorAtual;

  salvarClientes();

  renderizarClientes();
}

function corStatus(status) {

  switch(status) {

    case 'Novo':
      return 'bg-blue-500/20 text-blue-400';

    case 'Pensando':
      return 'bg-yellow-500/20 text-yellow-400';

    case 'Não respondeu':
      return 'bg-red-500/20 text-red-400';

    case 'Não atendeu':
      return 'bg-zinc-500/20 text-zinc-300';

    case 'Fechado':
      return 'bg-green-500/20 text-green-400';

    default:
      return 'bg-zinc-500/20 text-zinc-300';
  }
}

function renderizarClientes() {

  const container =
    document.getElementById('clientesContainer');

  const busca =
    document
      .getElementById('search')
      .value
      .toLowerCase();

  const filtro =
    document
      .getElementById('filtroStatus')
      .value;

  container.innerHTML = '';

  const filtrados = clientes

    .filter(cliente =>
      cliente.nome.toLowerCase().includes(busca)
    )

    .filter(cliente => {

      if(filtro === 'Todos') return true;

      return cliente.status === filtro;
    });

  const inicio =
    (paginaAtual - 1) * clientesPorPagina;

  const fim =
    inicio + clientesPorPagina;

  const pagina =
    filtrados.slice(inicio, fim);

  pagina.forEach((cliente, index) => {

    container.innerHTML += `

      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5 hover:border-orange-500 transition">

        <div class="flex justify-between items-start gap-3 mb-4">

          <div>

            <h3 class="text-2xl font-bold">
              ${cliente.nome}
            </h3>

            <p class="text-zinc-400 mt-1">
              📞 ${cliente.telefone || '-'}
            </p>

          </div>

          <span class="px-3 py-1 rounded-full text-sm ${corStatus(cliente.status)}">

            ${cliente.status}

          </span>

        </div>

        <div class="space-y-3 mb-5">

          <p>
            📶 Plano Atual:
            <strong>${cliente.planoAtual}</strong>
          </p>

          <div>

            <p class="mb-2">
              🚀 Plano Escolhido:
            </p>

            <select
              onchange="alterarPlano(${inicio + index}, this.value)"
              class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2 outline-none">

              <option value="500MB" ${cliente.planoOfertado === '500MB' ? 'selected' : ''}>500MB</option>

              <option value="600MB" ${cliente.planoOfertado === '600MB' ? 'selected' : ''}>600MB</option>

              <option value="800MB" ${cliente.planoOfertado === '800MB' ? 'selected' : ''}>800MB</option>

              <option value="1GB" ${cliente.planoOfertado === '1GB' ? 'selected' : ''}>1GB</option>

            </select>

          </div>

          <p>
            💰 Comissão:
            <strong>R$ ${cliente.comissao}</strong>
          </p>

        </div>

        <div class="flex flex-wrap gap-2">

          <button
            onclick="copiarNumero('${cliente.telefone}')"
            class="bg-green-500/20 hover:bg-green-500/30 text-green-400 px-3 py-2 rounded-xl text-sm">

            Copiar Número
          </button>

          <button
            onclick="alterarStatus(${inicio + index}, 'Pensando')"
            class="bg-yellow-500/20 hover:bg-yellow-500/30 text-yellow-400 px-3 py-2 rounded-xl text-sm">

            Pensando
          </button>

          <button
            onclick="alterarStatus(${inicio + index}, 'Não respondeu')"
            class="bg-red-500/20 hover:bg-red-500/30 text-red-400 px-3 py-2 rounded-xl text-sm">

            Não respondeu
          </button>

          <button
            onclick="alterarStatus(${inicio + index}, 'Não atendeu')"
            class="bg-zinc-500/20 hover:bg-zinc-500/30 text-zinc-300 px-3 py-2 rounded-xl text-sm">

            Não atendeu
          </button>

          <button
            onclick="alterarStatus(${inicio + index}, 'Fechado')"
            class="bg-orange-500/20 hover:bg-orange-500/30 text-orange-400 px-3 py-2 rounded-xl text-sm">

            Fechado
          </button>

          <button
            onclick="excluirCliente(${inicio + index})"
            class="bg-red-900/20 hover:bg-red-900/30 text-red-300 px-3 py-2 rounded-xl text-sm">

            Excluir
          </button>

        </div>

      </div>

    `;
  });

  const totalClientes =
    clientes.length;

  const upsFechados =
    clientes.filter(cliente =>
      cliente.status === 'Fechado'
    ).length;

  const pendentes =
    clientes.filter(cliente =>
      cliente.status !== 'Fechado'
    ).length;

  const comissaoTotal =
    clientes

      .filter(cliente =>
        cliente.status === 'Fechado'
      )

      .reduce(
        (total, cliente) =>
          total + Number(cliente.comissao || 0),
        0
      );

  document.getElementById('totalClientes')
    .innerText = totalClientes;

  document.getElementById('upsFechados')
    .innerText = upsFechados;

  document.getElementById('pendentes')
    .innerText = pendentes;

  document.getElementById('comissaoTotal')
    .innerText = `R$ ${comissaoTotal}`;

  const totalPaginas =
    Math.ceil(filtrados.length / clientesPorPagina) || 1;

  document.getElementById('paginaInfo')
    .innerText =
      `Página ${paginaAtual} de ${totalPaginas}`;
}

function paginaAnterior() {

  if(paginaAtual > 1) {

    paginaAtual--;

    renderizarClientes();
  }
}

function proximaPagina() {

  const totalPaginas =
    Math.ceil(clientes.length / clientesPorPagina);

  if(paginaAtual < totalPaginas) {

    paginaAtual++;

    renderizarClientes();
  }
}

function exportarClientes() {

  const blob = new Blob(
    [JSON.stringify(clientes, null, 2)],
    {
      type: 'application/json'
    }
  );

  const url =
    URL.createObjectURL(blob);

  const a =
    document.createElement('a');

  a.href = url;

  a.download = 'clientes.json';

  a.click();
}

function importarPlanilha(event) {

  const file =
    event.target.files[0];

  if(!file) return;

  const reader =
    new FileReader();

  reader.onload = function(e) {

    const data =
      new Uint8Array(e.target.result);

    const workbook =
      XLSX.read(data, {
        type: 'array'
      });

    const worksheet =
      workbook.Sheets[
        workbook.SheetNames[0]
      ];

    const rows =
      XLSX.utils.sheet_to_json(
        worksheet,
        { header: 1 }
      );

    const novosClientes = [];

    for(let i = 1; i < rows.length; i++) {

      const row = rows[i];

      if(!row || row.length === 0) continue;

      const nome =
        row[0] || `Cliente ${i}`;

      const telefone =
        row[1] || '';

      const planoAtual =
        '400MB';

      const planoOfertado =
        sugestoesUP[planoAtual];

      const valorAtual =
        valoresPlanos[planoAtual];

      const valorNovo =
        valoresPlanos[planoOfertado];

      const comissao =
        valorNovo - valorAtual;

      novosClientes.push({

        nome: String(nome),

        telefone: String(telefone),

        planoAtual,
        planoOfertado,
        comissao,

        status: 'Novo',

        followup: ''

      });
    }

    clientes = novosClientes;

    salvarClientes();

    renderizarClientes();

    alert(
      `${novosClientes.length} clientes importados 😭🧡`
    );
  };

  reader.readAsArrayBuffer(file);
}

renderizarClientes();

</script>

</body>
</html>
